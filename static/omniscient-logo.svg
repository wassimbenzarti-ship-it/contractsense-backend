<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" width="100" height="120">
  <!-- Ghost body: round head, flows right, single tail curling left at bottom -->
  <path d="M50 7 C70 5 92 24 92 47 C92 70 84 82 76 90 C70 96 62 102 54 99 C50 97 48 85 43 83 C38 81 31 106 26 109 C21 112 14 104 16 95 C18 86 10 66 10 46 C10 26 26 7 50 7 Z"
    fill="#f4f1fc" stroke="#1a1a1a" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Scales: vertical post -->
  <line x1="50" y1="14" x2="50" y2="28" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Scales: horizontal beam -->
  <line x1="23" y1="28" x2="77" y2="28" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Left ring -->
  <circle cx="23" cy="28" r="3.5" fill="#f4f1fc" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Left chains (V from ring to pan edges) -->
  <line x1="23" y1="31.5" x2="10" y2="40" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  <line x1="23" y1="31.5" x2="36" y2="40" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  <!-- Left pan: D-shape bowl -->
  <path d="M10 40 Q23 68 36 40 Z" fill="#b8acd4" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Right ring -->
  <circle cx="77" cy="28" r="3.5" fill="#f4f1fc" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Right chains -->
  <line x1="77" y1="31.5" x2="64" y2="40" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  <line x1="77" y1="31.5" x2="90" y2="40" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  <!-- Right pan: D-shape bowl -->
  <path d="M64 40 Q77 68 90 40 Z" fill="#b8acd4" stroke="#1a1a1a" stroke-width="2"/>
</svg>
